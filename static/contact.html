<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/lucide.js"></script>
</head>
<body class="bg-gray-100 text-gray-900">
  <header class="bg-white shadow">
    <div class="container mx-auto px-4 py-6 flex justify-between items-center">
      <h1 class="text-2xl font-bold">GeoRoute BR</h1>
      <nav class="space-x-4">
        <a href="index.html" class="text-blue-600 hover:underline">Home</a>
        <a href="dashboard.html" class="text-blue-600 hover:underline">Dashboard</a>
        <a href="map.html" class="text-blue-600 hover:underline">Mapa</a>
        <a href="search.html" class="text-blue-600 hover:underline">Busca</a>
        <a href="as_detail.html" class="text-blue-600 hover:underline">Detalhe AS</a>
        <a href="about.html" class="text-blue-600 hover:underline">Sobre</a>
        <a href="contact.html" class="text-blue-600 hover:underline">Contato</a>
      </nav>
    </div>
  </header>

  <main class="container mx-auto px-4 py-12">
    <h2 class="text-3xl font-semibold mb-4">Fale Conosco</h2>
    <p class="mb-6">Tem alguma dúvida? Entre em contato conosco através do formulário abaixo.</p>
    <form class="space-y-4 max-w-lg">
      <div>
        <label class="block mb-1" for="name">Nome</label>
        <input class="w-full border rounded px-3 py-2" type="text" id="name" name="name" required>
      </div>
      <div>
        <label class="block mb-1" for="email">Email</label>
        <input class="w-full border rounded px-3 py-2" type="email" id="email" name="email" required>
      </div>
      <div>
        <label class="block mb-1" for="message">Mensagem</label>
        <textarea class="w-full border rounded px-3 py-2" id="message" name="message" rows="5" required></textarea>
      </div>
      <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 flex items-center space-x-2" type="submit">
        <i data-lucide="send" class="w-5 h-5"></i>
        <span>Enviar</span>
      </button>
    </form>
  </main>

  <footer class="bg-white border-t">
    <div class="container mx-auto px-4 py-4 text-center text-sm">
      &copy; 2026 GeoRoute BR. Todos os direitos reservados.
    </div>
  </footer>

  <script>lucide.createIcons();</script>
</body>
</html>

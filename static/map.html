<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Interativo GeoRoute BR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/d3@7"></script>
  <script src="https://unpkg.com/lucide@latest/dist/lucide.js"></script>
</head>
<body class="bg-gray-100 text-gray-900">
  <header class="bg-white shadow">
    <div class="container mx-auto px-4 py-6 flex justify-between items-center">
      <h1 class="text-2xl font-bold">GeoRoute BR</h1>
      <nav class="space-x-4">
        <a href="index.html" class="text-blue-600 hover:underline">Home</a>
        <a href="dashboard.html" class="text-blue-600 hover:underline">Dashboard</a>
        <a href="map.html" class="text-blue-600 hover:underline font-semibold">Mapa</a>
        <a href="search.html" class="text-blue-600 hover:underline">Busca</a>
        <a href="as_detail.html" class="text-blue-600 hover:underline">Detalhe AS</a>
        <a href="about.html" class="text-blue-600 hover:underline">Sobre</a>
        <a href="contact.html" class="text-blue-600 hover:underline">Contato</a>
      </nav>
    </div>
  </header>

  <main class="container mx-auto px-4 py-12">
    <h2 class="text-3xl font-semibold mb-6">Mapa Interativo</h2>
    <div class="mb-4 flex space-x-2">
      <input id="search" class="border rounded px-3 py-2 flex-1" placeholder="Digite prefixo ou ASN" />
      <button id="highlightBtn" class="bg-blue-600 text-white px-4 py-2 rounded">Highlight</button>
    </div>
    <div id="graph" class="border rounded" style="width:100%;height:600px;"></div>
  </main>

  <footer class="bg-white border-t">
    <div class="container mx-auto px-4 py-4 text-center text-sm">
      &copy; 2026 GeoRoute BR. Todos os direitos reservados.
    </div>
  </footer>

<script>
// demo data
const nodes = [
  {id:'AS1'}, {id:'AS2'}, {id:'AS3'}, {id:'AS4'}
];
const links = [
  {source:'AS1',target:'AS2'},
  {source:'AS2',target:'AS3'},
  {source:'AS3',target:'AS4'},
  {source:'AS1',target:'AS4'}
];

const width = document.getElementById('graph').clientWidth;
const height = document.getElementById('graph').clientHeight;

const svg = d3.select('#graph').append('svg')
    .attr('width', width)
    .attr('height', height)
    .call(d3.zoom().on('zoom', (event) => {
        svg.attr('transform', event.transform);
    }))
  .append('g');

const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(150))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(width/2, height/2));

const link = svg.append('g')
    .attr('stroke', '#aaa')
  .selectAll('line')
  .data(links)
  .join('line');

const node = svg.append('g')
    .attr('stroke', '#fff')
    .attr('stroke-width', 1.5)
  .selectAll('circle')
  .data(nodes)
  .join('circle')
    .attr('r', 10)
    .attr('fill', '#3182ce')
    .call(drag(simulation))
    .on('click', (event,d) => {
      // navigate to detail page
      window.location.href = 'as_detail.html?asn=' + encodeURIComponent(d.id);
    });

node.append('title').text(d=>d.id);

simulation.on('tick', () => {
  link
      .attr('x1', d=>d.source.x)
      .attr('y1', d=>d.source.y)
      .attr('x2', d=>d.target.x)
      .attr('y2', d=>d.target.y);
  node
      .attr('cx', d=>d.x)
      .attr('cy', d=>d.y);
});

function drag(simulation) {
  function dragstarted(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
  }
  function dragged(event) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
  }
  function dragended(event) {
    if (!event.active) simulation.alphaTarget(0);
    event.subject.fx = null;
    event.subject.fy = null;
  }
  return d3.drag()
      .on('start', dragstarted)
      .on('drag', dragged)
      .on('end', dragended);
}

// highlight placeholder
highlightBtn.addEventListener('click', () => {
  const term = search.value.trim();
  if (!term) return;
  node.attr('fill', d=> d.id.includes(term) ? 'orange' : '#3182ce');
});
</script>

<script>lucide.createIcons();</script>
</body>
</html>
